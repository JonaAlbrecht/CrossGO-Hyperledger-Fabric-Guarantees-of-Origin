test:
  workers:
    type: local
    number: 10
  rounds:
    # ============================================================
    # ADMIN QUERIES (lightweight)
    # ============================================================
    - label: GetVersion-500tps
      description: admin:GetVersion point query at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/getVersion.js

    - label: GetVersion-1000tps
      description: admin:GetVersion point query at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getVersion.js

    - label: GetVersion-2000tps
      description: admin:GetVersion at 2000 TPS — ceiling test
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 2000
      workload:
        module: workload/getVersion.js

    # ============================================================
    # POINT READS — GetDevice
    # ============================================================
    - label: GetDevice-500tps
      description: device:GetDevice point query at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/getDevice.js
        arguments:
          maxDeviceId: 30

    - label: GetDevice-1000tps
      description: device:GetDevice at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getDevice.js
        arguments:
          maxDeviceId: 30

    - label: GetDevice-2000tps
      description: device:GetDevice at 2000 TPS — stress test
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 2000
      workload:
        module: workload/getDevice.js
        arguments:
          maxDeviceId: 30

    # ============================================================
    # RANGE QUERIES — ListDevices (full scan)
    # ============================================================
    - label: ListDevices-100tps
      description: device:ListDevices range query at 100 TPS
      txNumber: 500
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/listDevices.js

    - label: ListDevices-500tps
      description: device:ListDevices at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/listDevices.js

    - label: ListDevices-1000tps
      description: device:ListDevices at 1000 TPS — stress test
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/listDevices.js

    # ============================================================
    # PAGINATED QUERIES — ListDevicesPaginated
    # ============================================================
    - label: ListDevicesPaginated-500tps
      description: device:ListDevicesPaginated (page=10) at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/listDevicesPaginated.js
        arguments:
          pageSize: 10

    - label: ListDevicesPaginated-1000tps
      description: device:ListDevicesPaginated (page=10) at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/listDevicesPaginated.js
        arguments:
          pageSize: 10

    # ============================================================
    # eGO RANGE + PAGINATED QUERIES
    # ============================================================
    - label: GetCurrentEGOsList-500tps
      description: query:GetCurrentEGOsList at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/getCurrentEGOsList.js

    - label: GetCurrentEGOsList-1000tps
      description: query:GetCurrentEGOsList at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getCurrentEGOsList.js

    - label: GetCurrentEGOsListPaginated-500tps
      description: query:GetCurrentEGOsListPaginated (page=50) at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/getCurrentEGOsListPaginated.js
        arguments:
          pageSize: 50

    - label: GetCurrentEGOsListPaginated-1000tps
      description: query:GetCurrentEGOsListPaginated (page=50) at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getCurrentEGOsListPaginated.js
        arguments:
          pageSize: 50

    # ============================================================
    # bGO RANGE QUERIES
    # ============================================================
    - label: GetCurrentBGOsList-500tps
      description: query:GetCurrentBGOsList biogas range query at 500 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/getCurrentBGOsList.js

    - label: GetCurrentBGOsList-1000tps
      description: query:GetCurrentBGOsList at 1000 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getCurrentBGOsList.js

    # ============================================================
    # WRITE BENCHMARKS — device registration
    # ============================================================
    - label: RegisterDevice-serial
      description: device:RegisterDevice serial (1 worker)
      txNumber: 20
      rateControl:
        type: fixed-load
        opts:
          startTps: 2
          transactionLoad: 1
      workload:
        module: workload/registerDevice.js

    - label: RegisterDevice-10tps
      description: device:RegisterDevice at 10 TPS
      txNumber: 100
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/registerDevice.js

    - label: RegisterDevice-25tps
      description: device:RegisterDevice at 25 TPS
      txNumber: 250
      rateControl:
        type: fixed-rate
        opts:
          tps: 25
      workload:
        module: workload/registerDevice.js

    - label: RegisterDevice-50tps
      description: device:RegisterDevice at 50 TPS — stress
      txNumber: 500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/registerDevice.js

    # ============================================================
    # WRITE BENCHMARKS — eGO creation
    # ============================================================
    - label: CreateElectricityGO-serial
      description: issuance:CreateElectricityGO serial
      txNumber: 10
      rateControl:
        type: fixed-load
        opts:
          startTps: 2
          transactionLoad: 1
      workload:
        module: workload/createElectricityGO.js

    - label: CreateElectricityGO-10tps
      description: issuance:CreateElectricityGO at 10 TPS
      txNumber: 100
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/createElectricityGO.js

    - label: CreateElectricityGO-25tps
      description: issuance:CreateElectricityGO at 25 TPS
      txNumber: 250
      rateControl:
        type: fixed-rate
        opts:
          tps: 25
      workload:
        module: workload/createElectricityGO.js

    # ============================================================
    # WRITE BENCHMARKS — bGO creation
    # ============================================================
    - label: CreateBiogasGO-serial
      description: biogas:CreateBiogasGO serial
      txNumber: 10
      rateControl:
        type: fixed-load
        opts:
          startTps: 2
          transactionLoad: 1
      workload:
        module: workload/createBiogasGO.js

    - label: CreateBiogasGO-10tps
      description: biogas:CreateBiogasGO at 10 TPS
      txNumber: 100
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/createBiogasGO.js

    # ============================================================
    # WRITE BENCHMARKS — admin org registration
    # ============================================================
    - label: RegisterOrganization-serial
      description: admin:RegisterOrganization serial
      txNumber: 10
      rateControl:
        type: fixed-load
        opts:
          startTps: 2
          transactionLoad: 1
      workload:
        module: workload/registerOrganization.js

    - label: RegisterOrganization-10tps
      description: admin:RegisterOrganization at 10 TPS
      txNumber: 50
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/registerOrganization.js
