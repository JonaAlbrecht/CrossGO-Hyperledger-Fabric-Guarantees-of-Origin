test:
  name: GO Platform v10.1 Write Operations Test
  description: Test write operations with MSP-prefixed identities
  workers:
    number: 4

  rounds:
  # -- READ benchmarks (sanity check) --
  - label: GetVersion
    description: admin:GetVersion (read, sanity check)
    txNumber: 100
    rateControl:
      type: fixed-rate
      opts:
        tps: 50
    workload:
      module: workload/getVersion.js
    chaincodeId: golifecycle
    channel: electricity-de

  # -- WRITE benchmarks (using default identity from first org in channel) --
  - label: PublishOracleData
    description: oracle:PublishOracleData (write, issuer identity from network config default)
    txNumber: 50
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/publishOracleData.js
    chaincodeId: golifecycle
    channel: electricity-de

  # -- READ benchmark --
  - label: GetCurrentEGOsList
    description: issuance:GetCurrentEGOsList (read)
    txNumber: 100
    rateControl:
      type: fixed-rate
      opts:
        tps: 20
    workload:
      module: workload/getCurrentEGOsList.js
    chaincodeId: golifecycle
    channel: electricity-de
