test:
  name: GO Platform v10.1 Write Operations Test
  description: Test write operations with MSP-prefixed identities
  workers:
    number: 4

  rounds:
  # -- READ benchmarks (sanity check) --
  - label: GetVersion
    description: admin:GetVersion (read, sanity check)
    txNumber: 100
    rateControl:
      type: fixed-rate
      opts:
        tps: 50
    workload:
      module: workload/getVersion.js
    chaincodeId: golifecycle
    channel: electricity-de

  # -- WRITE benchmarks --
  - label: AddToBacklogElectricity
    description: backlog:AddToBacklogElectricity (write with producer identity)
    txNumber: 50
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/addToBacklogElectricity.js
    chaincodeId: golifecycle
    channel: electricity-de

  - label: PublishOracleData
    description: oracle:PublishOracleData (write with issuer identity)
    txNumber: 50
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/publishOracleData.js
    chaincodeId: golifecycle
    channel: electricity-de

  - label: CreateElectricityGO
    description: issuance:CreateElectricityGO (write, SBE endorsement, producer identity)
    txNumber: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 5
    workload:
      module: workload/createElectricityGO.js
    chaincodeId: golifecycle
    channel: electricity-de

  # -- READ with specific identity --
  - label: GetElectricityBacklog
    description: backlog:GetElectricityBacklog (read with producer identity)
    txNumber: 100
    rateControl:
      type: fixed-rate
      opts:
        tps: 20
    workload:
      module: workload/getElectricityBacklog.js
    chaincodeId: golifecycle
    channel: electricity-de
