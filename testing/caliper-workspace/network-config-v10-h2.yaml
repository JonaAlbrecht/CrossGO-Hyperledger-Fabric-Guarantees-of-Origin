name: go-platform-v10-hydrogen
version: "2.0.0"
caliper:
  blockchain: fabric
  sutOptions:
    mutualTls: false

channels:
  - channelName: hydrogen-de
    contracts:
      - id: golifecycle

organizations:
  - mspid: hissuerMSP
    identities:
      certificates:
        - name: hissuer_admin
          clientPrivateKey:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hissuer.go-platform.com/users/Admin@hissuer.go-platform.com/msp/keystore/priv_sk
          clientSignedCert:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hissuer.go-platform.com/users/Admin@hissuer.go-platform.com/msp/signcerts/Admin@hissuer.go-platform.com-cert.pem
    connectionProfile:
      path: connection-profiles/ccp-v10-hissuer.yaml
      discover: true

  - mspid: hproducer1MSP
    identities:
      certificates:
        - name: hproducer1_admin
          clientPrivateKey:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hproducer1.go-platform.com/users/Admin@hproducer1.go-platform.com/msp/keystore/priv_sk
          clientSignedCert:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hproducer1.go-platform.com/users/Admin@hproducer1.go-platform.com/msp/signcerts/Admin@hproducer1.go-platform.com-cert.pem
    connectionProfile:
      path: connection-profiles/ccp-v10-hproducer1.yaml
      discover: true

  - mspid: hbuyer1MSP
    identities:
      certificates:
        - name: hbuyer1_admin
          clientPrivateKey:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hbuyer1.go-platform.com/users/Admin@hbuyer1.go-platform.com/msp/keystore/priv_sk
          clientSignedCert:
            path: /root/hlf-go/repo/network/organizations/peerOrganizations/hbuyer1.go-platform.com/users/Admin@hbuyer1.go-platform.com/msp/signcerts/Admin@hbuyer1.go-platform.com-cert.pem
    connectionProfile:
      path: connection-profiles/ccp-v10-hbuyer1.yaml
      discover: true
