# ---------------------------------------------------------------------------
# Cryptogen configuration for the GO Platform network
# 4 peer orgs: Issuer, Electricity Producer, Hydrogen Producer, Buyer
# 4-node Raft orderer cluster
# ---------------------------------------------------------------------------
OrdererOrgs:
  - Name: Orderer
    Domain: orderer.go-platform.com
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer1
        SANS:
          - localhost
          - 127.0.0.1
          - orderer1.go-platform.com
      - Hostname: orderer2
        SANS:
          - localhost
          - 127.0.0.1
          - orderer2.go-platform.com
      - Hostname: orderer3
        SANS:
          - localhost
          - 127.0.0.1
          - orderer3.go-platform.com
      - Hostname: orderer4
        SANS:
          - localhost
          - 127.0.0.1
          - orderer4.go-platform.com

PeerOrgs:
  - Name: issuer1
    Domain: issuer1.go-platform.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
        - 127.0.0.1
    Users:
      Count: 1

  - Name: eproducer1
    Domain: eproducer1.go-platform.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
        - 127.0.0.1
    Users:
      Count: 1

  - Name: hproducer1
    Domain: hproducer1.go-platform.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
        - 127.0.0.1
    Users:
      Count: 1

  - Name: buyer1
    Domain: buyer1.go-platform.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
        - 127.0.0.1
    Users:
      Count: 1
