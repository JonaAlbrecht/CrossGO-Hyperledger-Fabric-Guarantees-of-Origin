# Docker Compose for Fabric CA services (one CA per organization)
version: '3.7'

networks:
  go-platform:
    name: go-platform_network

services:
  ca.issuer1.go-platform.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.issuer1.go-platform.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-issuer1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - 7054:7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/issuer1:/etc/hyperledger/fabric-ca-server
    networks:
      - go-platform

  ca.producer1.go-platform.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.producer1.go-platform.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-producer1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - 8054:8054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/producer1:/etc/hyperledger/fabric-ca-server
    networks:
      - go-platform

  ca.consumer1.go-platform.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.consumer1.go-platform.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-consumer1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
    ports:
      - 9054:9054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/consumer1:/etc/hyperledger/fabric-ca-server
    networks:
      - go-platform

  ca.orderer.go-platform.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.orderer.go-platform.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
    ports:
      - 10054:10054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/orderer:/etc/hyperledger/fabric-ca-server
    networks:
      - go-platform
