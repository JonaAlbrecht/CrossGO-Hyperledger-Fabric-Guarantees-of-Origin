---
# ---------------------------------------------------------------------------
# Tiered GO Platform — Channel Configuration
# Roles: Issuer (Tier 1), EProducer / HProducer (Tier 2), Buyer (Tier 3)
# ---------------------------------------------------------------------------
Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: organizations/ordererOrganizations/orderer.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer1.go-platform.com:7050
      - orderer2.go-platform.com:8050
      - orderer3.go-platform.com:9050
      - orderer4.go-platform.com:10050

  - &Issuer1
    Name: Issuer1
    ID: issuer1MSP
    MSPDir: organizations/peerOrganizations/issuer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('issuer1MSP.admin', 'issuer1MSP.peer', 'issuer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('issuer1MSP.admin', 'issuer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('issuer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('issuer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.issuer1.go-platform.com
        Port: 7051

  - &EProducer1
    Name: EProducer1
    ID: eproducer1MSP
    MSPDir: organizations/peerOrganizations/eproducer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin', 'eproducer1MSP.peer', 'eproducer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin', 'eproducer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('eproducer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.eproducer1.go-platform.com
        Port: 9051

  - &HProducer1
    Name: HProducer1
    ID: hproducer1MSP
    MSPDir: organizations/peerOrganizations/hproducer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin', 'hproducer1MSP.peer', 'hproducer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin', 'hproducer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('hproducer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.hproducer1.go-platform.com
        Port: 11051

  - &Buyer1
    Name: Buyer1
    ID: buyer1MSP
    MSPDir: organizations/peerOrganizations/buyer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('buyer1MSP.admin', 'buyer1MSP.peer', 'buyer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('buyer1MSP.admin', 'buyer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('buyer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('buyer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.buyer1.go-platform.com
        Port: 13051

# ---------------------------------------------------------------------------
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

# ---------------------------------------------------------------------------
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

# ---------------------------------------------------------------------------
Orderer: &OrdererDefaults
  OrdererType: etcdraft
  BatchTimeout: 500ms
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer1.go-platform.com
        Port: 7050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer1.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer1.orderer.go-platform.com/tls/server.crt
      - Host: orderer2.go-platform.com
        Port: 8050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer2.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer2.orderer.go-platform.com/tls/server.crt
      - Host: orderer3.go-platform.com
        Port: 9050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer3.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer3.orderer.go-platform.com/tls/server.crt
      - Host: orderer4.go-platform.com
        Port: 10050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer4.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer4.orderer.go-platform.com/tls/server.crt
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

# ---------------------------------------------------------------------------
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

# ---------------------------------------------------------------------------
Profiles:
  # v7.0 (legacy): All orgs on a single channel
  GOPlatformChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Issuer1
        - *EProducer1
        - *HProducer1
        - *Buyer1

  # v8.0 (ADR-030): Electricity carrier channel — DE jurisdiction
  # Members: Issuer (trust anchor + relay), EProducer (electricity producer), Buyer (consumer)
  # HProducer is NOT a member — cannot see electricity GO data or transactions
  ElectricityDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Issuer1
        - *EProducer1
        - *Buyer1

  # v8.0 (ADR-030): Hydrogen carrier channel — DE jurisdiction
  # Members: Issuer (trust anchor + relay), HProducer (hydrogen producer), Buyer (consumer)
  # EProducer is NOT a member — cannot see hydrogen GO data or transactions
  HydrogenDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Issuer1
        - *HProducer1
        - *Buyer1

  # v10.1 (ADR-033): Biogas carrier channel — DE jurisdiction
  # Members: Issuer (trust anchor + relay), EProducer (biogas producer), Buyer (consumer)
  # In sample setup, EProducer produces both electricity and biogas (multi-carrier producer)
  BiogasDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Issuer1
        - *EProducer1  # Multi-carrier: produces electricity + biogas
        - *Buyer1

  # v10.1 (ADR-033): Heating/Cooling carrier channel — DE jurisdiction
  # Members: Issuer (trust anchor + relay), HProducer (heating producer), Buyer (consumer)
  # In sample setup, HProducer produces both hydrogen and heating/cooling (multi-carrier producer)
  HeatingDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Issuer1
        - *HProducer1  # Multi-carrier: produces hydrogen + heating/cooling
        - *Buyer1
