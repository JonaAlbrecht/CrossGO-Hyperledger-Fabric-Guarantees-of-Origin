---
# v10.1: Two-channel topology (ADR-030)
# electricity-de: eissuerMSP + eproducer1MSP + ebuyer1MSP
# hydrogen-de:   hissuerMSP + hproducer1MSP + hbuyer1MSP

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: organizations/ordererOrganizations/orderer.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer1.go-platform.com:7050
      - orderer2.go-platform.com:8050
      - orderer3.go-platform.com:9050
      - orderer4.go-platform.com:10050

  - &EIssuer
    Name: EIssuer
    ID: eissuerMSP
    MSPDir: organizations/peerOrganizations/eissuer.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('eissuerMSP.admin', 'eissuerMSP.peer', 'eissuerMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('eissuerMSP.admin', 'eissuerMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('eissuerMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('eissuerMSP.peer')"
    AnchorPeers:
      - Host: peer0.eissuer.go-platform.com
        Port: 7051

  - &HIssuer
    Name: HIssuer
    ID: hissuerMSP
    MSPDir: organizations/peerOrganizations/hissuer.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('hissuerMSP.admin', 'hissuerMSP.peer', 'hissuerMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('hissuerMSP.admin', 'hissuerMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('hissuerMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('hissuerMSP.peer')"
    AnchorPeers:
      - Host: peer0.hissuer.go-platform.com
        Port: 8051

  - &EProducer1
    Name: EProducer1
    ID: eproducer1MSP
    MSPDir: organizations/peerOrganizations/eproducer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin', 'eproducer1MSP.peer', 'eproducer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin', 'eproducer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('eproducer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('eproducer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.eproducer1.go-platform.com
        Port: 9051

  - &HProducer1
    Name: HProducer1
    ID: hproducer1MSP
    MSPDir: organizations/peerOrganizations/hproducer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin', 'hproducer1MSP.peer', 'hproducer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin', 'hproducer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('hproducer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('hproducer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.hproducer1.go-platform.com
        Port: 11051

  - &EBuyer1
    Name: EBuyer1
    ID: ebuyer1MSP
    MSPDir: organizations/peerOrganizations/ebuyer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ebuyer1MSP.admin', 'ebuyer1MSP.peer', 'ebuyer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('ebuyer1MSP.admin', 'ebuyer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('ebuyer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ebuyer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.ebuyer1.go-platform.com
        Port: 13051

  - &HBuyer1
    Name: HBuyer1
    ID: hbuyer1MSP
    MSPDir: organizations/peerOrganizations/hbuyer1.go-platform.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('hbuyer1MSP.admin', 'hbuyer1MSP.peer', 'hbuyer1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('hbuyer1MSP.admin', 'hbuyer1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('hbuyer1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('hbuyer1MSP.peer')"
    AnchorPeers:
      - Host: peer0.hbuyer1.go-platform.com
        Port: 14051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  BatchTimeout: 500ms
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer1.go-platform.com
        Port: 7050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer1.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer1.orderer.go-platform.com/tls/server.crt
      - Host: orderer2.go-platform.com
        Port: 8050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer2.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer2.orderer.go-platform.com/tls/server.crt
      - Host: orderer3.go-platform.com
        Port: 9050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer3.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer3.orderer.go-platform.com/tls/server.crt
      - Host: orderer4.go-platform.com
        Port: 10050
        ClientTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer4.orderer.go-platform.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.go-platform.com/orderers/orderer4.orderer.go-platform.com/tls/server.crt
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  ElectricityDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *EIssuer
        - *EProducer1
        - *EBuyer1

  HydrogenDEChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HIssuer
        - *HProducer1
        - *HBuyer1
